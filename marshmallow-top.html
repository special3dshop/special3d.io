<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marshmallow Top - Special 3D</title>
<link rel="icon" href="favicon.png">
<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:"Segoe UI", sans-serif; }
body { background:#f3f3f3; color:#111; }

/* Navbar */
.navbar { background:black; padding:20px 80px; display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; z-index:100; }
.navbar .logo { color:white; font-weight:700; letter-spacing:2px; font-size:20px; }
.navbar a { color:white; text-decoration:none; margin-left:35px; font-size:14px; transition:0.3s; }
.navbar a:hover { color:#00bfff; }

/* Product Section with Thumbnail List */
.product-container { display:flex; gap:40px; padding:60px; background:white; border-radius:15px; max-width:1200px; margin:60px auto; flex-wrap:wrap; }
.thumbnail-list { display:flex; flex-direction:column; gap:15px; }
.thumbnail-list img { width:80px; height:80px; object-fit:cover; border-radius:10px; cursor:pointer; border:2px solid transparent; transition:0.3s; }
.thumbnail-list img:hover, .thumbnail-list img.active { border-color:#00bfff; }
.product-main { flex:1; min-width:300px; display:flex; flex-direction:column; align-items:center; }
.product-main img { width:100%; max-width:500px; border-radius:15px; object-fit:cover; }

/* Product Info */
.product-info { flex:1; min-width:300px; display:flex; flex-direction:column; justify-content:flex-start; gap:15px; }
.product-title { font-size:36px; font-weight:700; }
.price { font-size:28px; font-weight:bold; color:#00bfff; }
.old-price { text-decoration:line-through; color:gray; margin-left:10px; font-weight:500; }
.stock { margin:10px 0; font-weight:bold; color:green; }
.buy-btn { padding:14px; font-size:16px; background:#00bfff; color:white; border:none; border-radius:12px; cursor:pointer; transition:0.3s; width:fit-content; }
.buy-btn:hover { background:#009acd; transform:translateY(-2px); }

/* Full-width scroll images */
.full-scroll { display:flex; flex-direction:column; gap:40px; margin-top:60px; }
.full-scroll .scroll-item { position:relative; width:100%; min-height:60vh; background:#ddd; display:flex; justify-content:center; align-items:center; border-radius:15px; }
.full-scroll .scroll-item img { width:90%; max-width:1200px; border-radius:15px; object-fit:cover; }
.full-scroll .scroll-item .caption { position:absolute; bottom:20px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.5); color:white; padding:10px 20px; border-radius:8px; font-size:16px; text-align:center; }

/* Responsive */
@media(max-width:1000px) {
    .product-container { flex-direction:column; align-items:center; padding:40px; }
    .thumbnail-list { flex-direction:row; justify-content:center; gap:10px; margin-bottom:20px; }
    .thumbnail-list img { width:60px; height:60px; }
}
</style>
</head>
<body>

<div class="navbar">
  <div class="logo">Special 3D</div>
  <div>
    <a href="products.html">Products</a>
    <a href="parts.html">Parts</a>
    <a href="support.html">Support</a>
    <a href="company.html">Company</a>
  </div>
</div>

<!-- Product Section -->
<div class="product-container">
  <div class="thumbnail-list">
    <img src="" alt="Thumb 1" class="active" onclick="changeMain(this)">
    <img src="" alt="Thumb 2" onclick="changeMain(this)">
    <img src="" alt="Thumb 3" onclick="changeMain(this)">
    <img src="" alt="Thumb 4" onclick="changeMain(this)">
  </div>
  <div class="product-main">
    <img src="" alt="Main Product" id="mainImage">
  </div>
  <div class="product-info">
    <div class="product-title">Marshmallow Top</div>
    <div><span class="price">$5.00</span><span class="old-price">$6.00</span></div>
    <div class="stock">In Stock</div>
    <div class="description">
      Smooth matte finish, high precision, lightweight design. Perfect collectible for display and stacking.
    </div>
    <button class="buy-btn" onclick="window.location.href='#'">Buy on Etsy</button>
  </div>
</div>

<!-- Full Page Scroll Images -->
<div class="full-scroll">
  <div class="scroll-item">
    <img src="" alt="Full Scroll 1">
    <div class="caption">2x Material Savings</div>
  </div>
  <div class="scroll-item">
    <img src="" alt="Full Scroll 2">
    <div class="caption">Top Mounted Spool Holder Frees Space</div>
  </div>
  <div class="scroll-item">
    <img src="" alt="Full Scroll 3">
    <div class="caption">Flow Dynamic Calibration</div>
  </div>
  <div class="scroll-item">
    <img src="" alt="Full Scroll 4">
    <div class="caption">Next-Gen Multi-Color Printing</div>
  </div>
</div>

<script>
function changeMain(el) {
  document.querySelectorAll('.thumbnail-list img').forEach(img => img.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('mainImage').src = el.src;
}
</script>

</body>
</html>
