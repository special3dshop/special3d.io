<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Products - Special 3D</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f5f5f5;
}

.navbar {
    background: black;
    padding: 15px 60px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.navbar a {
    color: white;
    text-decoration: none;
    margin-left: 30px;
}

.container {
    display: flex;
    padding: 40px 60px;
    gap: 40px;
}

.sidebar {
    width: 250px;
    background: white;
    padding: 25px;
    border-radius: 8px;
}

.sidebar h3 {
    margin-top: 0;
}

.filter-group {
    margin-bottom: 30px;
}

.filter-group label {
    display: block;
    margin-bottom: 8px;
}

.products-section {
    flex: 1;
}

.top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
}

.products-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 25px;
}

.product-card {
    background: white;
    padding: 20px;
    border-radius: 10px;
    transition: 0.3s;
}

.product-card:hover {
    transform: translateY(-5px);
}

.product-image {
    width: 100%;
    aspect-ratio: 1 / 1;
    overflow: hidden;
    border-radius: 8px;
    margin-bottom: 15px;
}

.product-image img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.price {
    font-weight: bold;
    margin-top: 10px;
}

.old-price {
    text-decoration: line-through;
    color: gray;
    font-size: 14px;
}
</style>
</head>

<body>

<div class="navbar">
    <div style="color:white; font-weight:bold;">Special 3D</div>
    <div>
        <a href="products.html">Products</a>
        <a href="parts.html">Parts</a>
        <a href="support.html">Support</a>
        <a href="company.html">Company</a>
    </div>
</div>

<div class="container">

<div class="sidebar">
    <h3>Filter</h3>

    <div class="filter-group">
        <strong>Availability</strong>
        <label><input type="checkbox" id="inStock"> In Stock</label>
        <label><input type="checkbox" id="outStock"> Out of Stock</label>
    </div>

    <div class="filter-group">
        <strong>Price Range</strong>
        <input type="range" id="priceRange">
        <div id="priceDisplay"></div>
    </div>
</div>

<div class="products-section">

<div class="top-bar">
    <h2>Compare 3D Printers</h2>
    <select id="sortSelect">
        <option value="featured">Featured</option>
        <option value="low">Price: Low to High</option>
        <option value="high">Price: High to Low</option>
        <option value="az">Name: A–Z</option>
    </select>
</div>

<div class="products-grid" id="productsGrid"></div>

</div>
</div>

<script>
const products = [
    {name:"Kobra X", price:299, oldPrice:399, stock:true, image:"product1.jpg"},
    {name:"Kobra S1 Max Combo", price:849, oldPrice:1099, stock:true, image:"product2.jpg"},
    {name:"Kobra S1 Combo", price:429, oldPrice:749, stock:false, image:"product3.jpg"},
    {name:"Kobra 3 Max Combo", price:599, oldPrice:999, stock:true, image:"product4.jpg"},
    {name:"Kobra 3 V2 Combo", price:299, oldPrice:499, stock:true, image:"product5.jpg"},
    {name:"Kobra S1 Max", price:649, oldPrice:899, stock:false, image:"product6.jpg"},
    {name:"Kobra S1", price:349, oldPrice:549, stock:true, image:"product7.jpg"},
    {name:"Kobra 3 Max", price:459, oldPrice:699, stock:true, image:"product8.jpg"},
    {name:"Kobra 3 V2", price:229, oldPrice:349, stock:true, image:"product9.jpg"},
    {name:"ACE 2 Pro", price:289, oldPrice:329, stock:false, image:"product10.jpg"},
    {name:"ACE Pro", price:269, oldPrice:355, stock:true, image:"product11.jpg"}
];

const grid = document.getElementById("productsGrid");
const inStockBox = document.getElementById("inStock");
const outStockBox = document.getElementById("outStock");
const sortSelect = document.getElementById("sortSelect");
const priceRange = document.getElementById("priceRange");
const priceDisplay = document.getElementById("priceDisplay");

const maxPrice = Math.max(...products.map(p=>p.price));
priceRange.max = maxPrice;
priceRange.value = maxPrice;
priceDisplay.innerText = "$0 - $" + maxPrice;

function renderProducts() {
    let filtered = [...products];

    if (inStockBox.checked && !outStockBox.checked)
        filtered = filtered.filter(p=>p.stock);
    if (!inStockBox.checked && outStockBox.checked)
        filtered = filtered.filter(p=>!p.stock);

    filtered = filtered.filter(p=>p.price <= priceRange.value);

    if (sortSelect.value === "low")
        filtered.sort((a,b)=>a.price-b.price);
    if (sortSelect.value === "high")
        filtered.sort((a,b)=>b.price-a.price);
    if (sortSelect.value === "az")
        filtered.sort((a,b)=>a.name.localeCompare(b.name));

    grid.innerHTML = "";

    filtered.forEach(p=>{
        grid.innerHTML += `
        <div class="product-card">
            <div class="product-image">
                <img src="${p.image}">
            </div>
            <h4>${p.name}</h4>
            <div class="price">$${p.price}</div>
            <div class="old-price">$${p.oldPrice}</div>
            <div>${p.stock ? "In Stock" : "Out of Stock"}</div>
        </div>
        `;
    });
}

priceRange.addEventListener("input", ()=>{
    priceDisplay.innerText = "$0 - $" + priceRange.value;
    renderProducts();
});

inStockBox.addEventListener("change", renderProducts);
outStockBox.addEventListener("change", renderProducts);
sortSelect.addEventListener("change", renderProducts);

renderProducts();
</script>

</body>
</html>
