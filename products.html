<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/png" href="favicon.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Products - Special 3D</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Segoe UI", sans-serif;
}

body {
    background: #ffffff;
    color: #111;
}

/* NAVBAR (match homepage) */
.navbar {
    background: rgba(0,0,0,0.9);
    padding: 20px 80px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.navbar .logo {
    color: white;
    font-weight: 700;
    letter-spacing: 2px;
}

.navbar a {
    color: white;
    text-decoration: none;
    margin-left: 35px;
    font-size: 14px;
    letter-spacing: 1px;
    transition: 0.3s;
}

.navbar a:hover {
    color: #00bfff;
}

/* PAGE HEADER */
.page-header {
    padding: 120px 80px 60px 80px;
}

.page-header h1 {
    font-size: 42px;
    margin-bottom: 10px;
}

.page-header p {
    color: #666;
    font-size: 18px;
}

/* LAYOUT */
.container {
    display: flex;
    padding: 40px 80px 120px 80px;
    gap: 60px;
}

/* SIDEBAR */
.sidebar {
    width: 260px;
    background: #f8f8f8;
    padding: 30px;
    border-radius: 14px;
    height: fit-content;
}

.filter-group {
    margin-bottom: 35px;
}

.filter-group strong {
    display: block;
    margin-bottom: 15px;
}

.filter-group label {
    display: block;
    margin-bottom: 10px;
    font-size: 14px;
}

/* PRODUCTS */
.products-section {
    flex: 1;
}

.top-bar {
    display: flex;
    justify-content: flex-end;
    margin-bottom: 40px;
}

select {
    padding: 10px 14px;
    border-radius: 8px;
    border: 1px solid #ddd;
}

.products-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 40px;
}

.product-card {
    background: white;
    padding: 25px;
    border-radius: 18px;
    transition: 0.35s ease;
    border: 1px solid #eee;
}

.product-card:hover {
    transform: translateY(-10px);
    box-shadow: 0 25px 50px rgba(0,0,0,0.1);
}

/* IMAGE */
.product-image {
    width: 100%;
    aspect-ratio: 1/1;
    overflow: hidden;
    border-radius: 14px;
    margin-bottom: 20px;
}

.product-image img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: 0.4s ease;
}

.product-card:hover img {
    transform: scale(1.08);
}

/* BADGE */
.sale-badge {
    display: inline-block;
    background: #111;
    color: white;
    font-size: 12px;
    padding: 6px 12px;
    border-radius: 20px;
    margin-bottom: 15px;
}

/* TEXT */
.product-card h4 {
    font-size: 20px;
    margin-bottom: 8px;
}

.price {
    font-size: 20px;
    font-weight: 700;
}

.old-price {
    text-decoration: line-through;
    color: #999;
    font-size: 14px;
}

.stock {
    margin-top: 8px;
    font-size: 13px;
    font-weight: 600;
}

.in-stock { color: #1a9c3f; }
.out-stock { color: #c21c1c; }

/* BUTTON */
.buy-btn {
    margin-top: 20px;
    padding: 12px;
    width: 100%;
    border: none;
    border-radius: 10px;
    background: linear-gradient(90deg,#00bfff,#0077ff);
    color: white;
    font-weight: 600;
    cursor: pointer;
    transition: 0.3s;
}

.buy-btn:hover {
    transform: scale(1.03);
}

@media(max-width: 1000px) {
    .container {
        flex-direction: column;
    }

    .sidebar {
        width: 100%;
    }
}
</style>
</head>
